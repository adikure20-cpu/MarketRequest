<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markt anfragen</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style type="text/css">
        * { margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #1D1D1B;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: relative;
        }

        /* Background image layer - same pattern as Jersey project */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .bg-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1;
        }

        /* Main content above background */
        .display-page {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 30px 40px;
            height: 100%;
        }

        .logo-area {
            margin-bottom: 16px;
        }

        .logo-area h1 {
            font-size: 48px;
            font-weight: bold;
            color: #dc0000;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo-area p {
            font-size: 22px;
            color: #ffffff;
            margin-top: 6px;
        }

        .qr-box {
            display: inline-block;
            background: #ffffff;
            padding: 20px;
            margin: 16px 0;
            border: 4px solid #dc0000;
            border-radius: 12px;
        }

        #qr-code {
            width: 200px;
            height: 200px;
        }

        .how-title {
            font-size: 36px;
            color: #ffd700;
            margin: 14px 0 10px;
            font-weight: bold;
        }

        .steps-row {
            margin: 0 auto;
            max-width: 600px;
        }

        .steps-row table {
            width: 100%;
            border-spacing: 10px;
        }

        .steps-row td {
            text-align: center;
            vertical-align: top;
            width: 33%;
        }

        .step-num {
            display: inline-block;
            width: 36px;
            height: 36px;
            line-height: 36px;
            border-radius: 50%;
            background: #dc0000;
            color: #ffffff;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 6px;
        }

        .step-text {
            font-size: 16px;
            color: #ffffff;
            line-height: 1.3;
        }

        .shop-box {
            margin: 14px auto;
            padding: 12px 24px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            display: inline-block;
        }

        .shop-name {
            color: #ffd700;
            font-weight: bold;
            font-size: 20px;
        }

        .shop-addr {
            color: #dddddd;
            font-size: 16px;
            margin-top: 3px;
        }

        .approved-box {
            margin: 14px auto;
            padding: 14px 20px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            text-align: left;
            display: inline-block;
            min-width: 320px;
        }

        .approved-box h3 {
            color: #ffd700;
            font-size: 18px;
            margin-bottom: 8px;
        }

        .appr-item {
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .appr-item:last-child {
            border-bottom: none;
        }

        .appr-badge {
            display: inline-block;
            background: #dc0000;
            color: #ffffff;
            font-size: 12px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 3px;
            text-transform: uppercase;
            margin-right: 10px;
        }

        .appr-name {
            color: #ffffff;
            font-size: 16px;
        }

        .no-appr {
            color: #aaaaaa;
            font-size: 16px;
            font-style: italic;
        }

        .error-box {
            padding: 100px 40px;
            text-align: center;
        }

        .error-box h2 {
            color: #dc0000;
            font-size: 48px;
            margin-bottom: 16px;
        }

        .error-box p {
            color: #cccccc;
            font-size: 22px;
        }
    </style>
</head>
<body>

    <div class="bg-image"><img src="img/bg-sports.jpg" alt=""></div>

    <div class="display-page">
        <div id="main-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <script src="data/akid_meta.js"></script>
    <script type="text/javascript">
        function getParam(name) {
            var s = window.location.search || '';
            var match = s.match(new RegExp('[?&]' + name + '=([^&]*)'));
            return match ? decodeURIComponent(match[1]) : null;
        }

        var BASE_URL = window.location.href.split('qr-display.html')[0] || (window.location.origin + '/');

        function init() {
            var akid = getParam('akid');

            if (!akid) {
                showError('Kein AKID angegeben.');
                return;
            }

            var shop = getShopByAkid(akid);
            if (!shop) {
                showError('Ungültige Shop-ID.');
                return;
            }

            renderDisplay(shop);
            loadApprovedMarkets(shop.akid);
            setInterval(function() { loadApprovedMarkets(shop.akid); }, 10000);
        }

        function showError(msg) {
            document.getElementById('main-container').innerHTML =
                '<div class="error-box">' +
                '<h2>Fehler</h2>' +
                '<p>' + msg + '</p>' +
                '</div>';
        }

        function renderDisplay(shop) {
            var customerUrl = BASE_URL + 'customer.html?akid=' + encodeURIComponent(shop.akid);

            document.getElementById('main-container').innerHTML =
                '<div class="logo-area">' +
                    '<h1>Markt anfragen</h1>' +
                    '<p>Markt nicht gefunden? Scannen &amp; anfragen!</p>' +
                '</div>' +
                '<div class="qr-box">' +
                    '<canvas id="qr-code"></canvas>' +
                '</div>' +
                '<div class="how-title">So funktioniert es</div>' +
                '<div class="steps-row"><table><tr>' +
                    '<td><span class="step-num">1</span><br><span class="step-text">QR-Code scannen</span></td>' +
                    '<td><span class="step-num">2</span><br><span class="step-text">Markt ausw\u00e4hlen</span></td>' +
                    '<td><span class="step-num">3</span><br><span class="step-text">Absenden</span></td>' +
                '</tr></table></div>' +
                '<div class="shop-box">' +
                    '<div class="shop-name">' + shop.accountName + '</div>' +
                    '<div class="shop-addr">' + shop.address + '</div>' +
                '</div><br>' +
                '<div class="approved-box" id="approved-section">' +
                    '<h3>K\u00fcrzlich genehmigt</h3>' +
                    '<div id="approved-list"><span class="no-appr">Noch keine genehmigten M\u00e4rkte.</span></div>' +
                '</div>';

            new QRious({
                element: document.getElementById('qr-code'),
                value: customerUrl,
                size: 200,
                foreground: '#1a1a1a',
                background: '#ffffff',
                level: 'M'
            });
        }

        function loadApprovedMarkets(akid) {
            try {
                var xhr = window.XMLHttpRequest ? new XMLHttpRequest() : new ActiveXObject('Microsoft.XMLHTTP');
                xhr.open('GET', '/api/requests?akid=' + encodeURIComponent(akid), true);
                xhr.onreadystatechange = function() {
                    if (xhr.readyState == 4 && xhr.status == 200) {
                        try {
                            var requests = JSON.parse(xhr.responseText);
                            var approved = [];
                            for (var i = 0; i < requests.length; i++) {
                                if (requests[i].status === 'approved' || requests[i].status === 'available') {
                                    approved.push(requests[i]);
                                }
                            }

                            var listEl = document.getElementById('approved-list');
                            if (!listEl) return;

                            if (approved.length === 0) {
                                listEl.innerHTML = '<span class="no-appr">Noch keine genehmigten M\u00e4rkte.</span>';
                                return;
                            }

                            var last4 = approved.slice(-4).reverse();
                            var html = '';
                            for (var j = 0; j < last4.length; j++) {
                                var r = last4[j];
                                var badge = r.status === 'available' ? 'LIVE' : 'Genehmigt';
                                var name = r.marketName || r.customMarket || '';
                                html += '<div class="appr-item">' +
                                    '<span class="appr-badge">' + badge + '</span>' +
                                    '<span class="appr-name">' + name + '</span>' +
                                    '</div>';
                            }
                            listEl.innerHTML = html;
                        } catch(e) {}
                    }
                };
                xhr.send(null);
            } catch(e) {}
        }

        if (window.addEventListener) {
            window.addEventListener('load', init, false);
        } else if (window.attachEvent) {
            window.attachEvent('onload', init);
        } else {
            window.onload = init;
        }
    </script>
</body>
</html>
