<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markt anfragen</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jersey+25&family=Roboto:wght@400;700;900&display=swap">
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1D1D1B;
        }

        body {
            font-family: Roboto, Arial, Helvetica, sans-serif;
            color: #ffffff;
        }

        /* Background image - absolutely positioned, no filter */
        #bg-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.35;
        }

        #bg-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Dark overlay */
        #bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.3);
        }

        /* Content wrapper */
        #content {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            padding-top: 30px;
        }

        .logo-area h1 {
            font-family: 'Jersey 25', Arial, sans-serif;
            font-size: 2.8rem;
            font-weight: 400;
            color: #dc0000;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo-area p {
            font-size: 1.1rem;
            color: #ffffff;
            margin-top: 6px;
        }

        .qr-box {
            display: inline-block;
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            margin: 20px auto;
            border: 3px solid #dc0000;
        }

        #qr-code {
            width: 200px;
            height: 200px;
        }

        .how-title {
            font-family: 'Jersey 25', Arial, sans-serif;
            font-size: 1.6rem;
            color: #ffd700;
            margin: 16px 0 12px;
            font-weight: 400;
        }

        .steps-row {
            margin: 0 auto;
            width: 80%;
            max-width: 500px;
        }

        .steps-row table {
            width: 100%;
            border-spacing: 10px;
        }

        .steps-row td {
            text-align: center;
            vertical-align: top;
            width: 33%;
        }

        .step-num {
            display: inline-block;
            width: 32px;
            height: 32px;
            line-height: 32px;
            border-radius: 50%;
            background: #dc0000;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 6px;
        }

        .step-text {
            font-size: 0.8rem;
            color: #ffffff;
            line-height: 1.3;
        }

        .shop-box {
            margin: 16px auto;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: inline-block;
        }

        .shop-box .shop-name {
            color: #ffd700;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .shop-box .shop-addr {
            color: #dddddd;
            font-size: 0.8rem;
            margin-top: 2px;
        }

        .approved-box {
            margin: 16px auto;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: left;
            display: inline-block;
            min-width: 300px;
        }

        .approved-box h3 {
            color: #ffd700;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .appr-item {
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .appr-item:last-child {
            border-bottom: none;
        }

        .appr-badge {
            display: inline-block;
            background: #dc0000;
            color: #fff;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 3px;
            text-transform: uppercase;
            margin-right: 8px;
        }

        .appr-name {
            color: #ffffff;
            font-size: 0.8rem;
        }

        .no-appr {
            color: #aaaaaa;
            font-size: 0.8rem;
            font-style: italic;
        }

        .error-box {
            padding: 60px 20px;
            text-align: center;
        }

        .error-box h2 {
            color: #dc0000;
            font-size: 1.8rem;
            margin: 16px 0 8px;
        }

        .error-box p {
            color: #cccccc;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <!-- Background: use img tag for max compatibility -->
    <div id="bg-img"><img src="img/bg-sports.jpg" alt=""></div>
    <div id="bg-overlay"></div>

    <!-- Content -->
    <div id="content">
        <div id="main-container"></div>
    </div>

    <!-- QR Code Library -->
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <script src="data/akid_meta.js"></script>
    <script>
        // Polyfill for URLSearchParams (old TVs)
        function getParam(name) {
            var match = window.location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
            return match ? decodeURIComponent(match[1]) : null;
        }

        var BASE_URL = window.location.href.split('qr-display.html')[0] || (window.location.origin + '/');

        function init() {
            var akid = getParam('akid');

            if (!akid) {
                showError('Kein AKID angegeben. Bitte URL mit gültigem akid-Parameter aufrufen.');
                return;
            }

            var shop = getShopByAkid(akid);
            if (!shop) {
                showError('Ungültige oder inaktive Shop-ID.');
                return;
            }

            renderDisplay(shop);
            loadApprovedMarkets(shop.akid);
            setInterval(function() { loadApprovedMarkets(shop.akid); }, 10000);
        }

        function showError(msg) {
            document.getElementById('main-container').innerHTML =
                '<div class="error-box">' +
                '<h2>Fehler</h2>' +
                '<p>' + msg + '</p>' +
                '</div>';
        }

        function renderDisplay(shop) {
            var customerUrl = BASE_URL + 'customer.html?akid=' + encodeURIComponent(shop.akid);

            document.getElementById('main-container').innerHTML =
                '<div class="logo-area">' +
                    '<h1>Markt anfragen</h1>' +
                    '<p>Markt nicht gefunden? Scannen & anfragen!</p>' +
                '</div>' +
                '<div class="qr-box">' +
                    '<canvas id="qr-code"></canvas>' +
                '</div>' +
                '<h2 class="how-title">So funktioniert es</h2>' +
                '<div class="steps-row"><table><tr>' +
                    '<td><span class="step-num">1</span><br><span class="step-text">QR-Code scannen</span></td>' +
                    '<td><span class="step-num">2</span><br><span class="step-text">Markt auswählen</span></td>' +
                    '<td><span class="step-num">3</span><br><span class="step-text">Absenden</span></td>' +
                '</tr></table></div>' +
                '<div class="shop-box">' +
                    '<div class="shop-name">' + shop.accountName + '</div>' +
                    '<div class="shop-addr">' + shop.address + '</div>' +
                '</div><br>' +
                '<div class="approved-box" id="approved-section">' +
                    '<h3>Kürzlich genehmigt</h3>' +
                    '<div id="approved-list"><span class="no-appr">Noch keine genehmigten Märkte.</span></div>' +
                '</div>';

            new QRious({
                element: document.getElementById('qr-code'),
                value: customerUrl,
                size: 200,
                foreground: '#1a1a1a',
                background: '#ffffff',
                level: 'M'
            });
        }

        function loadApprovedMarkets(akid) {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/requests?akid=' + encodeURIComponent(akid), true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState !== 4 || xhr.status !== 200) return;
                var requests = JSON.parse(xhr.responseText);
                var approved = [];
                for (var i = 0; i < requests.length; i++) {
                    if (requests[i].status === 'approved' || requests[i].status === 'available') {
                        approved.push(requests[i]);
                    }
                }

                var listEl = document.getElementById('approved-list');
                if (!listEl) return;

                if (approved.length === 0) {
                    listEl.innerHTML = '<span class="no-appr">Noch keine genehmigten Märkte.</span>';
                    return;
                }

                var last4 = approved.slice(-4).reverse();
                var html = '';
                for (var j = 0; j < last4.length; j++) {
                    var r = last4[j];
                    var badge = r.status === 'available' ? 'LIVE' : 'Genehmigt';
                    var name = r.marketName || r.customMarket || '';
                    html += '<div class="appr-item">' +
                        '<span class="appr-badge">' + badge + '</span>' +
                        '<span class="appr-name">' + name + '</span>' +
                        '</div>';
                }
                listEl.innerHTML = html;
            };
            xhr.send();
        }

        window.onload = init;
    </script>
</body>
</html>
