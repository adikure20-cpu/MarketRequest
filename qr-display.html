<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markt anfragen – QR scannen</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jersey+25&family=Roboto:wght@300;400;500;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Background layer */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #1D1D1B;
            background-image: url('img/bg-sports.jpg');
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover;
            filter: blur(3px);
            transform: scale(1.02);
            z-index: 0;
        }

        /* Dark overlay */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: 1;
        }

        /* Content on top */
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 30px;
            max-width: 600px;
            width: 100%;
        }

        .logo-area {
            margin-bottom: 20px;
        }

        .logo-area h1 {
            font-family: 'Jersey 25', 'Roboto', sans-serif;
            font-size: 3rem;
            font-weight: 400;
            color: #dc0000;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo-area p {
            font-size: 1.1rem;
            color: #ffffff;
            margin-top: 6px;
        }

        .qr-container {
            background: #ffffff;
            border-radius: 12px;
            padding: 24px;
            display: inline-block;
            margin: 20px 0;
            box-shadow: 0 10px 40px rgba(220, 0, 0, 0.2);
            border: 3px solid #dc0000;
        }

        #qr-code {
            width: 220px;
            height: 220px;
            display: block;
        }

        .instructions {
            margin-top: 20px;
        }

        .instructions h2 {
            font-family: 'Jersey 25', 'Roboto', sans-serif;
            font-size: 1.8rem;
            color: #ffd700;
            margin-bottom: 12px;
            font-weight: 400;
        }

        .instructions .steps {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 14px;
        }

        .step {
            text-align: center;
            max-width: 140px;
        }

        .step-number {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #dc0000;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            margin: 0 auto 8px;
        }

        .step p {
            font-size: 0.85rem;
            color: #ffffff;
            line-height: 1.3;
        }

        .shop-info {
            margin-top: 20px;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .shop-info p {
            color: #ffffff;
            font-size: 0.9rem;
        }

        .shop-info strong {
            color: #ffd700;
        }

        .shop-info .address {
            font-size: 0.8rem;
            color: #dddddd;
            margin-top: 3px;
        }

        .approved-markets {
            margin-top: 24px;
            text-align: left;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .approved-markets h3 {
            color: #ffd700;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .approved-market-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .approved-market-item:last-child {
            border-bottom: none;
        }

        .approved-badge {
            background: #dc0000;
            color: #ffffff;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 3px;
            text-transform: uppercase;
        }

        .approved-market-name {
            color: #ffffff;
            font-size: 0.85rem;
        }

        .no-approved {
            color: #cccccc;
            font-style: italic;
            font-size: 0.8rem;
        }

        .error-state {
            padding: 60px 20px;
            text-align: center;
        }

        .error-state h2 {
            font-family: 'Jersey 25', 'Roboto', sans-serif;
            color: #dc0000;
            font-size: 2rem;
            margin: 20px 0 10px;
        }

        .error-state p {
            color: #999;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <!-- Background layers (old TV compatible - real DOM elements, no pseudo) -->
    <div class="bg-layer"></div>
    <div class="bg-overlay"></div>

    <div class="container" id="main-container">
        <!-- Populated by JS -->
    </div>

    <!-- QR Code Library -->
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <script src="data/akid_meta.js"></script>
    <script>
        var BASE_URL = window.location.origin + window.location.pathname.replace('qr-display.html', '');

        function init() {
            var params = new URLSearchParams(window.location.search);
            var akid = params.get('akid');

            if (!akid) {
                showError('Kein AKID angegeben. Bitte URL mit gültigem akid-Parameter aufrufen.');
                return;
            }

            var shop = getShopByAkid(akid);
            if (!shop) {
                showError('Ungültige oder inaktive Shop-ID (AKID). Bitte prüfen Sie den QR-Code.');
                return;
            }

            renderDisplay(shop);
            loadApprovedMarkets(shop.akid);
            setInterval(function() { loadApprovedMarkets(shop.akid); }, 10000);
        }

        function showError(message) {
            document.getElementById('main-container').innerHTML =
                '<div class="error-state">' +
                '<div style="font-size: 4rem;">⚠️</div>' +
                '<h2>Fehler</h2>' +
                '<p>' + message + '</p>' +
                '</div>';
        }

        function renderDisplay(shop) {
            var customerUrl = BASE_URL + 'customer.html?akid=' + encodeURIComponent(shop.akid);

            document.getElementById('main-container').innerHTML =
                '<div class="logo-area">' +
                    '<h1>🎯 Markt anfragen</h1>' +
                    '<p>Markt nicht gefunden? Scannen & anfragen!</p>' +
                '</div>' +
                '<div class="qr-container">' +
                    '<canvas id="qr-code"></canvas>' +
                '</div>' +
                '<div class="instructions">' +
                    '<h2>So funktioniert es</h2>' +
                    '<div class="steps">' +
                        '<div class="step"><div class="step-number">1</div><p>QR-Code mit dem Handy scannen</p></div>' +
                        '<div class="step"><div class="step-number">2</div><p>Gewünschten Markt auswählen</p></div>' +
                        '<div class="step"><div class="step-number">3</div><p>Absenden & benachrichtigt werden</p></div>' +
                    '</div>' +
                '</div>' +
                '<div class="shop-info">' +
                    '<p><strong>' + shop.accountName + '</strong></p>' +
                    '<p class="address">📍 ' + shop.address + '</p>' +
                '</div>' +
                '<div class="approved-markets" id="approved-markets-section">' +
                    '<h3>✅ Kürzlich genehmigte Anfragen</h3>' +
                    '<div id="approved-markets-list">' +
                        '<p class="no-approved">Noch keine genehmigten Märkte.</p>' +
                    '</div>' +
                '</div>';

            new QRious({
                element: document.getElementById('qr-code'),
                value: customerUrl,
                size: 220,
                foreground: '#1a1a1a',
                background: '#ffffff',
                level: 'M'
            });
        }

        function loadApprovedMarkets(akid) {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/requests?akid=' + encodeURIComponent(akid), true);
            xhr.onload = function() {
                if (xhr.status !== 200) return;
                var requests = JSON.parse(xhr.responseText);
                var approved = [];
                for (var i = 0; i < requests.length; i++) {
                    if (requests[i].status === 'approved' || requests[i].status === 'available') {
                        approved.push(requests[i]);
                    }
                }

                var listEl = document.getElementById('approved-markets-list');
                if (!listEl) return;

                if (approved.length === 0) {
                    listEl.innerHTML = '<p class="no-approved">Noch keine genehmigten Märkte.</p>';
                    return;
                }

                var last4 = approved.slice(-4).reverse();
                var html = '';
                for (var j = 0; j < last4.length; j++) {
                    var r = last4[j];
                    var badge = r.status === 'available' ? 'LIVE' : 'Genehmigt';
                    var name = r.marketName || r.customMarket || '';
                    html += '<div class="approved-market-item">' +
                        '<span class="approved-badge">' + badge + '</span>' +
                        '<span class="approved-market-name">' + name + '</span>' +
                        '</div>';
                }
                listEl.innerHTML = html;
            };
            xhr.send();
        }

        window.onload = init;
    </script>
</body>
</html>
